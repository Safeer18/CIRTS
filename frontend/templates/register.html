{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm p-4">
            <h3 class="card-title text-center mb-4">
                <i class="fas fa-user-plus text-success"></i> Register
            </h3>
            <form method="POST">
                
                <!-- Username -->
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <!-- Confirm Password -->
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                </div>

                <!-- Role Selection -->
                <div class="mb-3">
                    <label for="role" class="form-label">Register As</label>
                    <select name="role" id="role" class="form-select" required onchange="toggleSectionSelect(this.value);">
                        <option value="citizen" selected>Citizen</option>
                        <option value="investigator">Investigator</option>
                    </select>
                </div>

                <!-- Police Section (Visible Only for Investigator) -->
                <div class="mb-3" id="sectionDiv" style="display:none;">
                    <label for="section_id" class="form-label">Police Section</label>
                    <select name="section_id" id="section_id" class="form-select">
                        <option value="">-- Select Section --</option>
                        {% for sec in police_sections %}
                        <option value="{{ sec.section_id }}">{{ sec.section_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn btn-success w-100">Register</button>
            </form>

            <hr>
            <p class="text-center">
                Already have an account?
                <a href="{{ url_for('login') }}">Login</a>
            </p>
        </div>
    </div>
</div>

<script>
function toggleSectionSelect(role) {
    var sectionDiv = document.getElementById('sectionDiv');
    if (role === 'investigator') {
        sectionDiv.style.display = 'block';
    } else {
        sectionDiv.style.display = 'none';
    }
}

window.onload = function() {
    var roleSelect = document.getElementById('role');
    if (roleSelect) toggleSectionSelect(roleSelect.value);
}
</script>
{% endblock %}
