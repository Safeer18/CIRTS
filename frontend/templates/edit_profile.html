{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="card p-3 mx-auto" style="max-width:700px;">
  <h4>Edit Profile</h4>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input class="form-control" name="username" value="{{ user.username }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input class="form-control" name="email" value="{{ user.email }}" type="email" required>
    </div>
    <button class="btn btn-primary" type="submit">Save changes</button>
    <a class="btn btn-secondary ms-2" href="{{ url_for('profile') }}">Cancel</a>
  </form>
</div>
{% endblock %}
