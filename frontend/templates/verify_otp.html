{% extends "base.html" %}
{% block title %}Verify OTP{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">
                    <i class="fas fa-key text-info"></i> Verify OTP
                </h3>
                <p class="text-center text-muted">An OTP has been sent to your registered email</p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="otp" class="form-label">Enter 6-digit OTP</label>
                        <input type="text" class="form-control text-center" id="otp" name="otp" maxlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 mb-3">
                        <i class="fas fa-check-circle"></i> Verify OTP
                    </button>
                </form>
                <div class="text-center">
                    <small class="text-muted">Didn't receive OTP? <a href="#" class="text-primary">Resend</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
